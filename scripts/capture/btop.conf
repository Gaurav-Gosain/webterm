#? Config file for btop, used only by scripts/capture/capture.mjs.
#
# The process box is off. Not to flatter the screenshot: a process list is a
# list of whatever happened to be running on the machine that generated the
# image, which is noise to a reader and the maintainer's business rather than
# the README's. The boxes that are left are the ones that exercise the
# terminal: block graphs, box drawing and 256-colour gradients.
shown_boxes = "cpu mem net"
color_theme = "Default"
theme_background = True
truecolor = True
update_ms = 500
proc_tree = False
graph_symbol = "block"
rounded_corners = True
base_10_sizes = False
show_battery = False
